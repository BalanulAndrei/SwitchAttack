<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<!-- Using Bootstrap for styling -->
	<link href="/public/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<!-- Script for implementing the topology layout visualization -->
	<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>
<style>
	body {
        overflow: hidden; 
        margin: 0;
        padding: 0;
    }
	#mynetwork {
		width: 100%;
		height: 75vh; 
		overflow: hidden; 
	}
	.zona-stanga { /*Zona pentru afisatul topologiei*/ 
		background-color: #0d6efd;
		color: white;
		min-height: 75vh;
	}
	.zona-dreapta { /*Zona pentru afisatul Optiunilor de atac*/
		padding-top: 10px;
		padding-right: 10px;
		background-color: #f1f5f9;
		color: #212529;
		border-left: 2px solid #cbd5e1;
		border-bottom: 2px solid #cbd5e1;
		min-height: 75vh;
		min-width: 25vh;
	}
	.zona-jos { /*Zona pentru afisatul logurilor*/
		background-color: #f8f9fa;
		
		overflow-wrap: break-word;
		overflow-y: auto;
		overflow-anchor: auto;
		
		height: 24.5vh;
		max-height: 24.5vh;
		min-width: 25vw;
		padding: 10px;
		position: fixed;
		left: 25vw;
		width: 50vw;
		overflow-y: auto;
		text-align: left;
		border: black;
		border: 2px solid #adb5bd;
		border-radius: 20px;
	}
	.zona-dump {
		
		position: inherit;
		max-height: 45vh;
		height: 45vh;
		
				border-radius: 20px;
		padding-top: 10px;
		padding-left: 10px;
		margin-right: 10px;
		background-color: #f1f5f9;
		color: #212529;
		border-left: 2px solid #cbd5e1;
		border-bottom: 2px solid #cbd5e1;
		border-top: 2px solid #cbd5e1;
		overflow-wrap: break-word;
		overflow-y: auto;
		overflow-anchor: auto;
	}
</style>
<body>
	<div class="container-fluid p-0">
		<div class="row p-0">
			<!-- Topology -->
			<div class="col-9 p-0"> 
				<div id="mynetwork"></div>
				<!-- GUI -->
				<script src="/public/GUI.js" type="text/javascript"></script>
			</div>
			<!-- Options  -->
			<div class="col-3 zona-dreapta">
				<div class="d-flex flex-column gap-3">
				<button class="btn btn-light btn-lg shadow-sm" onclick="addUser();">
					Add User
				</button>
				<button class="btn btn-light btn-lg shadow-sm" onclick="addSwitch();">
					Add Switch
				</button>
				<button class="btn btn-light btn-lg shadow-sm" onclick="activeazaDesenareLegatura()">
					Add Link
				</button>
				<button class="btn btn-light btn-lg shadow-sm" onclick="fetchNetworkDump()">
					DUMP
				</button>
				<div class="zona-dump">
					<div id="sidebar-output">

					</div>
				</div>
				<!-- <button class="btn btn-light btn-lg shadow-sm">
					<a href="/show_info">
						Dump
					</a>
				</button> -->
        
    </div>
			</div>
		</div>
		<div class="row p-0">
			<div class="col-12 zona-jos ">
				<script>
					function logToBottom(message) {
						$("#bottom-output").append("<div>> " + message + "</div>");
						$(".zona-jos").scrollTop($(".zona-jos")[0].scrollHeight);
					}

					function logToSidebar(message) {
						$("#sidebar-output").html("<div>> " + message + "</div>");
						//$(".zona-dump").scrollTop($(".zona-dump")[0].scrollHeight);
					}
					var realConsoleLog = console.log;

					console.log = function() {
						var message = [].join.call(arguments, " ");
					
						var isSpam = message.includes("Event:") || 
							message.includes("hover") || 
							message.includes("pointer") ||
							message.includes("drag");
					
						if (!isSpam) {
							$(".output").append("<div>> " + message + "</div>");
							$(".zona-jos").scrollTop($(".zona-jos")[0].scrollHeight);
						}
					
						realConsoleLog.apply(console, arguments);
					};
				</script>
				<div class="output"></div>
			</div>
		</div>
	</div>
</body>
</html>
