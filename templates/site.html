<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<!-- Using Bootstrap for styling -->
	<link href="./public/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<!-- Script for implementing the topology layout visualization -->
	<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<style>
	#mynetwork {
		width: 100%;
		height: 75vh; 
		overflow: hidden; 
	}
	.zona-stanga { /*Zona pentru afisatul topologiei*/ 
		background-color: #0d6efd;
		color: white;
		min-height: 75vh;
	}
	.zona-dreapta { /*Zona pentru afisatul Optiunilor de atac*/
		background-color: #198754;
		color: white;
		min-height: 75vh;
		min-width: 25vh;
	}
	.zona-jos { /*Zona pentru afisatul logurilor*/
		background-color: #ffc107;
		min-height: 25vh	;
	}
</style>
<body>
	<div class="container-fluid">
		<div class="row">
			<!-- Topology -->
			<div class="col-9 p-0"> 
				<div id="mynetwork"></div>
				<!-- GUI -->
				<script src="../public/GUI.js" type="text/javascript"></script>
				<button onclick="addUser();">
					Add User
				</button>
				<button onclick="addSwitch();">
					Add Switch
				</button>
				<button onclick="activeazaDesenareLegatura()">
					Add Link
				</button>
				
			</div>
			<!-- Options  -->
			<div class="col-3 zona-dreapta p-3">
				<p>
					
				</p>
			</div>
		</div>
		<div class="row">
			<div class="col-12 zona-jos p-3">
				
			</div>
		</div>
	</div>
</body>
